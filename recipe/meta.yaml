{% set name = "andes" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 3292c44205b27867dd78da40539c79af8684c92850daa5b07e0221006ae1417e

build:
  number: 0
  noarch: python
  entry_points:
    - andes = andes.cli:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - kvxopt >=1.3.2.0,<1.4
    - numpy
    - scipy <2
    - sympy >=1.6,!=1.10.0
    - pandas
    - matplotlib-base
    - openpyxl
    - xlsxwriter
    - dill
    - pathos
    - tqdm
    - pyyaml
    - chardet
    - texttable
    - ipywidgets

test:
  imports:
    - andes
    - andes.core
  commands:
    - pip check
    - andes --help
  requires:
    - pip
    - python {{ python_min }}


about:
  home: https://github.com/cuihantao/andes
  license: GPL-3.0-or-later
  license_family: GPL3
  license_file: LICENSE.txt
  summary: Python Software for Symbolic Power System Modeling and Numerical Analysis
  doc_url: https://andes.readthedocs.io
  dev_url: https://github.com/cuihantao/andes
  description: |
    ANDES is a Python Software for Symbolic Power System Modeling and Numerical Analysis.
    Check out the introduction in the GitHub repository and documentation.

extra:
  recipe-maintainers:
    - cuihantao
